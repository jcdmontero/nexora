version: '3.8'

services:
  # Nginx Web Server
  nginx:
    image: nginx:1.25-alpine
    container_name: nexora-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - php-fpm
    networks:
      - nexora-network
    restart: unless-stopped

  # PHP-FPM
  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nexora-php-fpm
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    depends_on:
      - postgres
      - redis
      - websocket
    networks:
      - nexora-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nexora-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nexora}
      POSTGRES_USER: ${DB_USERNAME:-nexora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nexora-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nexora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - nexora-network
    restart: unless-stopped

  # WebSocket Server (Soketi - Pusher-compatible)
  websocket:
    image: quay.io/soketi/soketi:latest
    container_name: nexora-websocket
    environment:
      SOKETI_DEFAULT_APP_ID: nexora
      SOKETI_DEFAULT_APP_KEY: nexora-key
      SOKETI_DEFAULT_APP_SECRET: nexora-secret
      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: "true"
      SOKETI_PORT: 6001
    ports:
      - "6001:6001"
    networks:
      - nexora-network
    restart: unless-stopped

  # Queue Worker
  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nexora-queue-worker
    volumes:
      - .:/var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    depends_on:
      - redis
      - postgres
      - websocket
    networks:
      - nexora-network
    restart: unless-stopped

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nexora-scheduler
    volumes:
      - .:/var/www/html
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    depends_on:
      - redis
      - postgres
    networks:
      - nexora-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  nexora-network:
    driver: bridge
