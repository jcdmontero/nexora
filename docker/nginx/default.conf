server {
    listen 80;
    listen [::]:80;
    server_name nexora.local;

    # Redirect HTTP to HTTPS (uncomment for production)
    # return 301 https://$host$request_uri;

    root /var/www/html/public;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Logging
    access_log /var/log/nginx/nexora_access.log main;
    error_log /var/log/nginx/nexora_error.log warn;

    # Max upload size
    client_max_body_size 50M;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* \.(env|json|log|lock|md)$ {
        deny all;
    }

    # Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS off;

        # FastCGI optimization
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;

        # Timeouts
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;

        # Caching (optional - uncomment for production)
        # fastcgi_cache NEXORA;
        # fastcgi_cache_valid 200 60m;
        # fastcgi_cache_valid 404 1m;
        # fastcgi_cache_bypass $skip_cache;
        # fastcgi_no_cache $skip_cache;
    }

    # Static assets - Versioned Vite assets (1 year cache)
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|ico|svg|gif|jpe?g|png|webp|avif|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        log_not_found off;

        # Brotli/Gzip pre-compressed files
        location ~* \.(?:css|js)$ {
            gzip_static on;
            # brotli_static on;  # Uncomment if brotli module available
        }
    }

    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Rate limiting for auth endpoints
    location ~ ^/(login|register|password) {
        limit_req zone=login burst=3 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # API rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Deny direct access to storage (except public)
    location ~* /storage/(?!logs) {
        deny all;
    }

    # Deny access to bootstrap/cache
    location ~* /bootstrap/cache {
        deny all;
    }

    # Deny access to vendor directory
    location ~* /vendor {
        deny all;
    }
}

