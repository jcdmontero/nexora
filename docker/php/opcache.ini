; OPcache Configuration for Nexora Platform
; Optimized for production performance

[opcache]
; Enable OPcache
opcache.enable = 1
opcache.enable_cli = 0

; Memory settings
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.max_wasted_percentage = 10

; Revalidation
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.save_comments = 1
opcache.load_comments = 1

; Performance
opcache.fast_shutdown = 1
opcache.enable_file_override = 0
opcache.optimization_level = 0x7FFEBFFF

; JIT (Just-In-Time Compilation)
opcache.jit_buffer_size = 128M
opcache.jit = 1255

; Preloading (uncomment for production)
; opcache.preload = /var/www/html/bootstrap/preload.php
; opcache.preload_user = www-data

; Logging (uncomment for debugging)
; opcache.log_verbosity_level = 1
; opcache.error_log = /var/log/php/opcache.log

; Force revalidation in development
; opcache.validate_timestamps = 1
; opcache.revalidate_freq = 0

; Disable in production for maximum performance
; opcache.validate_timestamps = 0
; opcache.revalidate_freq = 0
