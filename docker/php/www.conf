; PHP-FPM Configuration for Nexora Platform
; Optimized for high-concurrency performance

[www]
; User and group
user = www-data
group = www-data

; Listen
listen = 0.0.0.0:9000

; Process management
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 1000
pm.process_idle_timeout = 10s

; Status page
pm.status_path = /fpm-status
ping.path = /fpm-ping

; Logging
access.log = /var/log/php-fpm/access.log
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{m}d %k \"%C\" \"%c\" \"%f:%l:%n\" %v %O"

; Slow log
slowlog = /var/log/php-fpm/slow.log
request_slowlog_timeout = 5s
request_terminate_timeout = 60s

; Security
security.limit_extensions = .php

; Environment variables
clear_env = no

; Resource limits
rlimit_files = 131072
rlimit_core = 0

; Workers
worker_processes = auto
worker_rlimit_nofile = 65535

; Timeout
timeout = 60s
