# Redis Configuration for Nexora Platform
# Optimized for cache, sessions, and queues

# Network
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# RDB snapshots (disabled for cache/queue usage)
save ""
# save 900 1
# save 300 10
# save 60 10000

# AOF (Append Only File) - disabled for performance
appendonly no
# appendfilename "appendonly.aof"
# appendfsync everysec

# Lua scripting
lua-time-limit 5000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100

# Clients
maxclients 10000

#Threads
# io-threads 4
# io-threads-do-reads yes

# Active defragmentation
active-defrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25

# LFU (Least Frequently Used) eviction
lfu-log-factor 10
lfu-decay-time 1

# LFU settings for better eviction
maxmemory-policy volatile-lru

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "CONFIG_b6a8e3f2"

# Logging
loglevel notice
logfile ""

# Database selection
databases 16

# Hash optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List optimization
list-max-ziplist-size -2
list-compress-depth 0

# Set optimization
set-max-intset-entries 512

# Sorted set optimization
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Active defrag for better memory usage
active-defrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25
active-defrag-max-scan-fields 1000

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
